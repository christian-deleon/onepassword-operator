name: Sync Upstream

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/1Password/onepassword-operator.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check if rebase needed
        id: check
        run: |
          LOCAL_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          if [ "$LOCAL_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "already_synced=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "already_synced=false" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits"
          fi

      - name: Rebase onto upstream
        if: steps.check.outputs.already_synced == 'false'
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "rebase_ok=true" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "rebase_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased main
        if: steps.check.outputs.already_synced == 'false' && steps.rebase.outputs.rebase_ok == 'true'
        run: git push --force-with-lease origin main

      - name: Open issue on conflict
        if: steps.check.outputs.already_synced == 'false' && steps.rebase.outputs.rebase_ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync failed: rebase conflict';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
            });
            if (issues.length > 0) {
              console.log('Issue already exists, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The automated rebase of `main` onto `upstream/main` failed due to conflicts.',
                '',
                'To resolve manually:',
                '```bash',
                'git fetch upstream main',
                'git rebase upstream/main',
                '# resolve conflicts',
                'git push --force-with-lease origin main',
                '```',
                '',
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['upstream-sync'],
            });
